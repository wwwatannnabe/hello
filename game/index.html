<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - アニマル育成</title>
    <style>
        body { font-family: sans-serif; background: #eceff1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #37474f; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cfd8dc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #3498db; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2980b9; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 0.9em; color: #546e7a; cursor: pointer; text-decoration: underline; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="title">ログイン</h2>
        
        <input type="text" id="username" placeholder="アカウント名 (英数字)">
        <input type="password" id="password" placeholder="パスワード">
        <input type="text" id="trainerName" class="hidden" placeholder="飼育員名 (表示名)">
        
        <button id="mainBtn" onclick="handleAuth()">ログイン</button>
        <div id="toggleLink" class="toggle-link" onclick="toggleMode()">アカウント作成はこちら</div>
    </div>

    <script>
        const API_URL = "https://animal-v3.kousuke555go.workers.dev"; // 自分のWorker URLに書き換え
        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('title').innerText = isLoginMode ? "ログイン" : "新規アカウント作成";
            document.getElementById('mainBtn').innerText = isLoginMode ? "ログイン" : "作成して開始";
            document.getElementById('toggleLink').innerText = isLoginMode ? "アカウント作成はこちら" : "ログイン画面に戻る";
            document.getElementById('trainerName').classList.toggle('hidden', isLoginMode);
        }

        async function handleAuth() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const trainerName = document.getElementById('trainerName').value;

            const endpoint = isLoginMode ? "/login" : "/signup";
            const body = isLoginMode ? { username, password } : { username, password, trainerName };

            try {
                const res = await fetch(API_URL + endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (res.ok) {
                    if (isLoginMode) {
                        // ログイン成功: 情報を保存してゲームへ
                        localStorage.setItem("animal_user", JSON.stringify(data.user));
                        location.href = "menu.html";
                    } else {
                        alert("作成完了！ログインしてください");
                        toggleMode();
                    }
                } else {
                    alert(data.error);
                }
            } catch (e) {
                alert("サーバー接続エラー");
            }
        }
    </script>
</body>
</html>
